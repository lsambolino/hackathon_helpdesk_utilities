<!doctype html>

  <link rel="stylesheet" href="/frontend/style.css" />
</head>
<body data-page="chat">
  <header class="topbar">
    <div class="brand">Helpdesk Servizio Idrico<small>Lombardia · area operativa</small></div>
    <nav>
      <a href="/frontend/index.html">Ticket</a>
      <a href="/frontend/chat.html" class="active">Chatbot</a>
